<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>A partnership proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;650;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#FBFAF7;--ink:#1B1813;--ink2:#514B42;--ink3:#8A8477;
  --accent:#E60054;--rule:#E8E3DA;--card:#FFFFFF;--sel:rgba(230,0,84,.12);--navy:#1B3A5C;
}
@media (prefers-color-scheme:dark){
  :root{--paper:#17140F;--ink:#ECE6DB;--ink2:#B7B0A2;--ink3:#847D6E;
    --accent:#FF4D7D;--rule:#322C24;--card:#1F1B15;--sel:rgba(255,77,125,.20);--navy:#8FB2D6;}
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--sel)}

#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper);z-index:50}
.gate-card{width:100%;max-width:352px;text-align:center}
.gate-kicker{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.gate-title{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:34px;line-height:1.05;margin-bottom:26px;color:var(--ink)}
#gate-form{display:flex;flex-direction:column;gap:11px}
#gate-input{font-size:16px;color:var(--ink);text-align:center;padding:13px 16px;border:1px solid var(--rule);border-radius:11px;background:transparent;outline:none;transition:border-color .2s}
#gate-input:focus{border-color:var(--accent)}
#gate-btn{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--paper);background:var(--ink);border:none;border-radius:11px;padding:13px 16px;cursor:pointer}
#gate-btn:hover{opacity:.86}
#gate-err{font-size:12px;color:var(--accent);min-height:16px}
body.locked{overflow:hidden}
body.locked .wrap{filter:blur(22px);pointer-events:none}

.wrap{max-width:680px;margin:0 auto;padding:72px 28px 110px}
.masthead{margin-bottom:16px}
.kicker{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:22px}
.title{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:clamp(38px,7vw,58px);line-height:1.04;letter-spacing:.004em;margin-bottom:22px}
.title em{font-style:italic;color:var(--accent)}
.dek{font-size:clamp(17px,2.4vw,20px);line-height:1.5;color:var(--ink2);max-width:34em}
.masthead .rule{width:46px;height:2px;background:var(--accent);margin-top:34px}
.precedent{margin-top:16px;font-size:15px;line-height:1.5;color:var(--ink3);font-style:italic;max-width:34em}

.block{margin:52px 0}
.block h2{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:clamp(27px,4.4vw,36px);line-height:1.1;margin-bottom:10px;letter-spacing:.004em}
.lede{font-size:16px;color:var(--ink2);max-width:38em;margin-bottom:22px}

.deal{background:var(--ink);color:var(--paper);border-radius:16px;padding:30px 32px}
.deal-label{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.deal-line{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(22px,3.4vw,29px);line-height:1.22;color:var(--paper);max-width:22em}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:22px 22px}
.c-num{font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:var(--accent);margin-bottom:8px}
.card h3{font-size:16px;font-weight:650;line-height:1.3;margin-bottom:8px}
.card p{font-size:14.5px;color:var(--ink2);line-height:1.55}

.costs{display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--rule)}
.cost{display:flex;align-items:baseline;gap:18px;padding:18px 0;border-bottom:1px solid var(--rule)}
.cost-big{font-family:'Instrument Serif',Georgia,serif;font-size:26px;color:var(--ink);min-width:130px;line-height:1}
.cost-txt{font-size:15.5px;color:var(--ink2)}
.cost-txt b{color:var(--ink);font-weight:600}

.rules{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)}
.rulerow{display:grid;grid-template-columns:170px 1fr;gap:20px;padding:18px 0;border-bottom:1px solid var(--rule)}
.r-k{font-weight:650;font-size:15.5px;color:var(--accent)}
.r-v{font-size:15px;color:var(--ink2);line-height:1.55}
.r-v b{color:var(--ink);font-weight:600}

.post{background:var(--card);border:1px solid var(--rule);border-radius:16px;padding:22px 24px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.post-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.post-av{width:44px;height:44px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
.post-meta b{display:block;font-size:14.5px}
.post-meta span{font-size:12.5px;color:var(--ink3)}
.post-body p{font-size:15.5px;line-height:1.6;margin-bottom:12px;color:var(--ink)}
.post-body p:last-child{margin-bottom:0}
.post-foot{margin-top:16px;padding-top:12px;border-top:1px solid var(--rule);font-size:12px;color:var(--ink3);letter-spacing:.02em}
.fine{font-size:13px;color:var(--ink3);margin-top:12px}

.flow{display:flex;align-items:stretch;gap:12px}
.step{flex:1;background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:18px}
.s-n{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:600;margin-bottom:10px}
.step p{font-size:14px;color:var(--ink2);line-height:1.5}
.step p b{color:var(--ink);font-weight:600}
.arr{display:flex;align-items:center;color:var(--ink3);font-size:20px}

.pkg{list-style:none;display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)}
.pkg li{display:flex;gap:16px;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--rule)}
.pkg .p-n{flex:none;width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-top:1px}
.pkg li div{font-size:15.5px;color:var(--ink2);line-height:1.55}
.pkg li b{color:var(--ink);font-weight:650}

.faq{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)}
.qa{padding:18px 0;border-bottom:1px solid var(--rule)}
.q{font-weight:650;font-size:15.5px;margin-bottom:5px}
.a{font-size:15px;color:var(--ink2);line-height:1.55}

.ask{background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:30px 32px}
.ask-h{color:var(--ink);margin-bottom:10px}
.ask p{font-size:17px;line-height:1.55;color:var(--ink);max-width:38em}
.ask p b{font-weight:650}
.ask-terms{margin-top:18px;font-size:13.5px;color:var(--ink3);letter-spacing:.01em}

.colophon{margin-top:70px;padding-top:26px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:12px}
.foot-meta{font-size:12.5px;color:var(--ink3)}
.lock{font-size:12px;color:var(--ink3);text-decoration:none;border-bottom:1px solid var(--rule);align-self:flex-start;padding-bottom:1px}
.lock:hover{color:var(--accent);border-color:var(--accent)}

@media (max-width:640px){
  .cards{grid-template-columns:1fr}
  .flow{flex-direction:column}.arr{transform:rotate(90deg);justify-content:center}
  .rulerow{grid-template-columns:1fr;gap:4px}
  .cost{flex-direction:column;gap:4px}.cost-big{min-width:0}
  .wrap{padding:52px 20px 90px}
}
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="gate-card">
    <div class="gate-kicker">Confidential</div>
    <div class="gate-title">A partnership proposal</div>
    <form id="gate-form" onsubmit="return gateSubmit(event)">
      <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
      <button id="gate-btn" type="submit">Open</button>
    </form>
    <div id="gate-err"></div>
  </div>
</div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,it){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);
const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);
const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));
return new TextDecoder().decode(pt);}
function reveal(h){const c=document.getElementById('content');c.innerHTML=h;c.hidden=false;
document.getElementById('gate').style.display='none';document.body.classList.remove('locked');}
async function gateSubmit(e){e.preventDefault();const i=document.getElementById('gate-input'),er=document.getElementById('gate-err');er.textContent='';
try{reveal(await decryptPayload(i.value));try{localStorage.setItem('kapart_pw',i.value);}catch(_){}}
catch(x){er.textContent='wrong password';i.value='';i.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('kapart_pw');if(c)reveal(await decryptPayload(c));}
catch(_){try{localStorage.removeItem('kapart_pw');}catch(_){}}})();
</script>
